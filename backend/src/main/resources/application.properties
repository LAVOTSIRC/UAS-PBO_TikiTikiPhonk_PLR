# ==========================================
# TikiTikiPhonk Backend - Configuration
# ==========================================

spring.application.name=tikitikiPhonk-backend

# Server
server.port=8080

# H2 File-based Database (persistent)
spring.datasource.url=jdbc:h2:file:./data/tikitiki;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Profile Pictures
app.profile-pictures.dir=./data/profile-pictures/

# JWT Configuration
app.jwt.secret=TikiTikiPhonkSuperSecretKeyForJWTHS512AlgorithmPLR2024MustBeLong1234567890ABCDEFGH
app.jwt.expiration=86400000

# Logging
logging.level.com.plr=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta
